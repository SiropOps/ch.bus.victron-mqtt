services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: van-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - van-mqtt-net

networks:
  van-mqtt-net:
    external: true

volumes:
  mosquitto_data:
  mosquitto_log:
